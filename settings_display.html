<div id="ctz-settings-block" class="extension-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Characteryze</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="flex-container flexFlowColumn flexNoGap" style="gap:6px;padding:4px 0;">
                <button id="ctz-launch-btn" class="menu_button" title="Open Characteryze overlay">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Launch
                </button>
                <button id="ctz-close-btn" class="menu_button" title="Exit Characteryze and restore previous profile">
                    <i class="fa-solid fa-right-from-bracket"></i> Close / Exit
                </button>
            </div>
        </div>
    </div>
</div>
